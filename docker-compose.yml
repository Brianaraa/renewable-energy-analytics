version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: renewable-energy-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data/raw:/app/data/raw
    environment:
      - MAPBOX_TOKEN=${MAPBOX_TOKEN:-}
    restart: unless-stopped
